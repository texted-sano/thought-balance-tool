<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考え比べツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --border: #222222;
  --accent: #cc0000;
  --text: #111111;
  --sub: #666666;
  --c0: #e85c3a;
  --c1: #3db8e8;
  --c2: #f1c40f;
  --c3: #2ecc71;
}

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

#select-screen {
  display: none !important;
}

#main-screen {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.app-title-main {
  font-size: 1.8rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  text-align: center;
  margin-bottom: 8px;
}

.content {
  flex: 1;
  padding: 32px 40px 160px;
  max-width: 880px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 24px;
}

.title-input {
  width: 100%;
  font-size: 1.15rem;
  font-weight: 700;
  font-family: inherit;
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  background: var(--card);
  color: var(--text);
  outline: none;
  transition: border-color 0.12s;
  text-align: center;
}
.title-input:focus { border-color: var(--accent); }
.title-input::placeholder { color: #bbb; font-weight: 400; }

.legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.88rem;
  font-weight: 700;
}
.legend-swatch {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 1.5px solid rgba(0,0,0,0.12);
  flex-shrink: 0;
}

.bar-area {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.axis-labels {
  position: relative;
  height: 1.2rem;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--sub);
  margin: 0 20px;
}
.axis-labels span {
  position: absolute;
  transform: translateX(-50%);
  white-space: nowrap;
}
.axis-labels span:nth-child(1) { left: 0%; }
.axis-labels span:nth-child(2) { left: 50%; }
.axis-labels span:nth-child(3) { left: 100%; }

.bar-outer {
  position: relative;
  height: 72px;
  user-select: none;
  padding: 0 20px;
}
.bar-track {
  position: absolute;
  top: 0; bottom: 0;
  left: 20px; right: 20px;
  border-radius: 6px;
  overflow: hidden;
}
.seg {
  height: 100%;
  position: absolute;
  top: 0;
}
.bar-labels {
  position: absolute;
  top: 0; bottom: 0;
  left: 20px; right: 20px;
  pointer-events: none;
}
.pct-lbl {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.88rem;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.45);
  white-space: nowrap;
}
.handle {
  position: absolute;
  top: 0px; bottom: 0px;
  width: 16px;
  transform: translateX(-50%);
  background: #ffffff;
  border: 2px solid rgba(0,0,0,0.28);
  border-radius: 5px;
  cursor: col-resize;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: #888;
}
.tick-row {
  position: relative;
  height: 10px;
  margin: 0 20px;
}
.tick {
  position: absolute;
  top: 0;
  width: 1px;
  height: 7px;
  background: #ccc;
  transform: translateX(-50%);
}

.opinion-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  min-height: 110px;
  align-content: flex-start;
}
.opinion-row.grid-2x2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  min-height: 110px;
}
@media (max-width: 600px) {
  .opinion-row.grid-2x2 {
    grid-template-columns: 1fr;
    min-height: auto;
  }
}

.opinion-item {
  flex: 1;
  min-width: 200px;
  display: flex;
  align-items: center;
  gap: 0;
  border: 2px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--card);
}
.opinion-dot {
  width: 44px;
  height: 44px;
  border-radius: 0;
  flex-shrink: 0;
  border: none;
  border-right: 2px solid var(--border);
}
.opinion-input {
  flex: 1;
  border: none;
  border-radius: 0;
  padding: 10px 12px;
  font-size: 0.92rem;
  font-family: inherit;
  font-weight: 700;
  background: var(--card);
  color: var(--text);
  outline: none;
}
.opinion-item:focus-within {
  border-color: var(--accent);
}
.opinion-item:focus-within .opinion-dot {
  border-right-color: var(--accent);
}
.opinion-input::placeholder { color: #bbb; font-weight: 400; }

.slot-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #2c2a27;
  padding: 16px 24px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
}
.slot-bar-inner {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: max-content;
}
.mode-select-row, .slots-row {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: flex-start;
}
.mode-label, .slot-label {
  color: #fff;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  width: 100px;
  text-align: right;
  flex-shrink: 0;
  margin-right: 8px;
}
.mode-btn {
  width: 76px;
  height: 40px;
  background: #3c3935;
  border: 2px solid #55514b;
  border-radius: 8px;
  color: #a39e95;
  font-size: 0.95rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.12s, color 0.12s, background-color 0.12s;
}
.mode-btn:hover {
  border-color: #888;
  color: #fff;
  background-color: #48443f;
}
.mode-btn.active {
  border-color: #fff;
  color: #fff;
  background-color: #55514b;
  font-weight: 900;
}
.mode-btn.active:hover {
  background-color: #615c55;
}
.slot-reset-btn {
  width: 76px;
  height: 40px;
  border: 2px solid #55514b;
  border-radius: 8px;
  background: #3c3935;
  color: #888;
  font-size: 0.8rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.12s, color 0.12s, background-color 0.12s;
}
.slot-reset-btn:hover {
  border-color: #cc0000;
  color: #fff;
  background-color: #422121;
}
.slot-btn {
  width: 76px;
  height: 40px;
  border: 2px solid #55514b;
  border-radius: 8px;
  background: #3c3935;
  color: #a39e95;
  font-size: 1.1rem;
  font-weight: 900;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.12s, color 0.12s, background-color 0.12s;
}
.slot-btn:hover {
  border-color: #888;
  color: #fff;
  background-color: #48443f;
}
.slot-btn.used   { border-color: #555; color: #bbb; }
.slot-btn.active { border-color: #fff; color: #fff; background-color: #55514b; font-weight: 900; }
.slot-btn.active:hover {
  background-color: #615c55;
}
</style>
</head>
<body>

<div id="select-screen"></div>

<div id="main-screen">
  <div class="content">
    <h1 class="app-title-main">考え比べツール</h1>
    <input class="title-input" id="title-input" type="text" placeholder="タイトルを入力">

    <div class="legend" id="legend"></div>

    <div class="bar-area">
      <div class="axis-labels">
        <span>0</span>
        <span>50</span>
        <span>100</span>
      </div>
      <div class="tick-row" id="tick-row"></div>
      <div class="bar-outer" id="bar-outer">
        <div class="bar-track" id="bar-track"></div>
        <div class="bar-labels" id="bar-labels"></div>
      </div>
    </div>

    <div class="opinion-row" id="opinion-row"></div>
  </div>

  <div class="slot-bar">
    <div class="slot-bar-inner">
      <div class="mode-select-row">
        <span class="mode-label">考えの数</span>
        <button class="mode-btn active" id="mode-btn-2" onclick="app.changeN(2)">2つ</button>
        <button class="mode-btn"        id="mode-btn-3" onclick="app.changeN(3)">3つ</button>
        <button class="mode-btn"        id="mode-btn-4" onclick="app.changeN(4)">4つ</button>
      </div>
      <div class="slots-row">
        <span class="slot-label">セーブスロット</span>
        <button class="slot-btn active" onclick="app.switchSlot(0)">1</button>
        <button class="slot-btn"        onclick="app.switchSlot(1)">2</button>
        <button class="slot-btn"        onclick="app.switchSlot(2)">3</button>
        <button class="slot-btn"        onclick="app.switchSlot(3)">4</button>
        <button class="slot-reset-btn"  onclick="app.resetSlot()">リセット</button>
      </div>
    </div>
  </div>
</div>

<script>
class ThinkCompareApp {
  constructor() {
    this.SETTINGS = {
      STORAGE_KEY: 'think_compare_slots_v6',
      COLORS: ['#e85c3a', '#3db8e8', '#f1c40f', '#2ecc71'],
      LABELS: ['考えその１', '考えその２', '考えその３', '考えその４'],
      MIN_PCT: 0
    };

    this.N = 2;
    this.current = 0;
    this.slots = [null, null, null, null];

    this.dragging = false;
    this.dragIdx = -1;
    this.dragStartX = 0;
    this.dragStartPcts = [];
    this.barWidth = 0;
  }

  init() {
    this.loadSlots();
    this.N = this.slots[0].N;
    this.current = 0;

    this.buildUI();
    this.loadSlot(0);

    window.addEventListener('resize', () => this.handleResize());
  }

  getColor(i) {
    return this.SETTINGS.COLORS[i];
  }

  makeSlot(targetN = this.N) {
    const base = Math.floor(100 / targetN);
    const pcts = Array.from({length: targetN}, (_, i) => base);
    pcts[targetN - 1] = 100 - base * (targetN - 1);
    return {
      N: targetN,
      title: '',
      labels: Array.from({length: targetN}, (_, i) => this.SETTINGS.LABELS[i]),
      pcts
    };
  }

  saveSlots() {
    try {
      localStorage.setItem(this.SETTINGS.STORAGE_KEY, JSON.stringify(this.slots));
    } catch (e) {
      console.warn('Save failed:', e);
    }
  }

  loadSlots() {
    try {
      const data = localStorage.getItem(this.SETTINGS.STORAGE_KEY);
      if (data) {
        const parsed = JSON.parse(data);
        for (let i = 0; i < this.slots.length; i++) {
          const item = parsed[i];
          if (item && item.N && [2,3,4].includes(item.N) && item.pcts && item.pcts.length === item.N) {
            this.slots[i] = item;
          } else {
            this.slots[i] = this.makeSlot(2);
          }
        }
      } else {
        for (let i = 0; i < this.slots.length; i++) {
          this.slots[i] = this.makeSlot(2);
        }
      }
    } catch (e) {
      console.warn('Load failed:', e);
      for (let i = 0; i < this.slots.length; i++) {
        this.slots[i] = this.makeSlot(2);
      }
    }
  }

  changeN(targetN) {
    if (this.N === targetN) return;
    this.slots[this.current] = this.makeSlot(targetN);
    this.N = targetN;
    this.saveSlots();
    this.buildUI();
    this.loadSlot(this.current);
  }

  updateModeButtons() {
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    const activeBtn = document.getElementById('mode-btn-' + this.N);
    if (activeBtn) activeBtn.classList.add('active');
  }

  buildUI() {
    const leg = document.getElementById('legend');
    leg.innerHTML = '';
    for (let i = 0; i < this.N; i++) {
      const item = document.createElement('div');
      item.className = 'legend-item';
      const sw = document.createElement('div');
      sw.className = 'legend-swatch';
      sw.style.background = this.getColor(i);
      const txt = document.createElement('span');
      txt.id = 'leg-txt-' + i;
      item.appendChild(sw); item.appendChild(txt);
      leg.appendChild(item);
    }

    const track  = document.getElementById('bar-track');
    const labDiv = document.getElementById('bar-labels');
    const outer  = document.getElementById('bar-outer');
    track.innerHTML = ''; labDiv.innerHTML = '';
    outer.querySelectorAll('.handle').forEach(h => h.remove());

    for (let i = 0; i < this.N; i++) {
      const seg = document.createElement('div');
      seg.className = 'seg';
      seg.id = 'seg-' + i;
      seg.style.background = this.getColor(i);
      track.appendChild(seg);

      const lbl = document.createElement('div');
      lbl.className = 'pct-lbl';
      lbl.id = 'pct-lbl-' + i;
      labDiv.appendChild(lbl);
    }

    for (let i = 0; i < this.N - 1; i++) {
      const h = document.createElement('div');
      h.className = 'handle';
      h.id = 'hdl-' + i;
      h.textContent = '⋮';
      h.addEventListener('mousedown',  e => this.onHandleDown(e, i));
      h.addEventListener('touchstart', e => this.onHandleTouchStart(e, i), {passive:false});
      outer.appendChild(h);
    }

    const tickRow = document.getElementById('tick-row');
    tickRow.innerHTML = '';
    for (let v = 0; v <= 100; v += 10) {
      const t = document.createElement('div');
      t.className = 'tick'; t.style.left = v + '%';
      tickRow.appendChild(t);
    }

    const row = document.getElementById('opinion-row');
    row.innerHTML = '';
    if (this.N === 4) {
      row.classList.add('grid-2x2');
    } else {
      row.classList.remove('grid-2x2');
    }

    for (let i = 0; i < this.N; i++) {
      const item = document.createElement('div');
      item.className = 'opinion-item';
      const dot = document.createElement('div');
      dot.className = 'opinion-dot';
      dot.style.background = this.getColor(i);
      const inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'opinion-input';
      inp.id = 'op-inp-' + i;
      inp.placeholder = this.SETTINGS.LABELS[i];
      inp.addEventListener('input', () => {
        this.slots[this.current].labels[i] = inp.value || this.SETTINGS.LABELS[i];
        this.updateLegendText(i);
        this.markUsed();
      });
      item.appendChild(dot); item.appendChild(inp);
      row.appendChild(item);
    }

    const oldTitleInput = document.getElementById('title-input');
    const newTitleInput = oldTitleInput.cloneNode(true);
    oldTitleInput.parentNode.replaceChild(newTitleInput, oldTitleInput);
    newTitleInput.addEventListener('input', () => {
      this.slots[this.current].title = newTitleInput.value;
      this.markUsed();
    });
  }

  renderBar() {
    const s = this.slots[this.current];
    if (!s) return;
    const outer = document.getElementById('bar-outer');
    const outerW = outer.getBoundingClientRect().width;
    const PAD = 20;
    const trackW = outerW - PAD * 2;
    let cum = 0;
    for (let i = 0; i < this.N; i++) {
      const seg = document.getElementById('seg-' + i);
      if (seg) {
        seg.style.left  = (cum / 100 * 100) + '%';
        seg.style.width = s.pcts[i] + '%';
      }
      const lbl = document.getElementById('pct-lbl-' + i);
      if (lbl) {
        lbl.style.left = (cum + s.pcts[i] / 2) + '%';
        lbl.textContent = s.pcts[i] + '%';
      }
      const legTxt = document.getElementById('leg-txt-' + i);
      if (legTxt) legTxt.textContent = (s.labels[i] || this.SETTINGS.LABELS[i]) + '　' + s.pcts[i] + '%';
      cum += s.pcts[i];
      
      if (i < this.N - 1) {
        const h = document.getElementById('hdl-' + i);
        if (h) h.style.left = (PAD + cum / 100 * trackW) + 'px';
      }
    }
  }

  updateLegendText(i) {
    const s = this.slots[this.current];
    const el = document.getElementById('leg-txt-' + i);
    if (el) el.textContent = (s.labels[i] || this.SETTINGS.LABELS[i]) + '　' + s.pcts[i] + '%';
  }

  onHandleDown(e, idx) {
    e.preventDefault();
    this.dragIdx       = idx;
    this.dragStartX    = e.clientX;
    this.dragStartPcts = [...this.slots[this.current].pcts];
    this.barWidth = document.getElementById('bar-outer').getBoundingClientRect().width - 40;
    this.dragging      = true;
    
    this._boundMouseMove = (evt) => this.onMouseMove(evt);
    this._boundMouseUp = () => this.onMouseUp();
    
    document.addEventListener('mousemove', this._boundMouseMove);
    document.addEventListener('mouseup',   this._boundMouseUp);
  }

  onHandleTouchStart(e, idx) {
    e.preventDefault();
    this.dragIdx       = idx;
    this.dragStartX    = e.touches[0].clientX;
    this.dragStartPcts = [...this.slots[this.current].pcts];
    this.barWidth = document.getElementById('bar-outer').getBoundingClientRect().width - 40;
    this.dragging      = true;
    
    this._boundTouchMove = (evt) => this.onTouchMove(evt);
    this._boundMouseUp = () => this.onMouseUp();

    document.addEventListener('touchmove', this._boundTouchMove, {passive:false});
    document.addEventListener('touchend',  this._boundMouseUp);
  }

  onMouseMove(e) { this.applyDrag(e.clientX); }
  onTouchMove(e) { e.preventDefault(); this.applyDrag(e.touches[0].clientX); }

  onMouseUp() {
    this.dragging = false;
    document.removeEventListener('mousemove', this._boundMouseMove);
    document.removeEventListener('mouseup',   this._boundMouseUp);
    document.removeEventListener('touchmove', this._boundTouchMove);
    document.removeEventListener('touchend',  this._boundMouseUp);
    this.markUsed();
  }

  applyDrag(clientX) {
    const dx   = clientX - this.dragStartX;
    const dpct = Math.round((dx / this.barWidth) * 100);
    const pcts = [...this.dragStartPcts];
    pcts[this.dragIdx]     = this.dragStartPcts[this.dragIdx]     + dpct;
    pcts[this.dragIdx + 1] = this.dragStartPcts[this.dragIdx + 1] - dpct;
    if (pcts[this.dragIdx]     < this.SETTINGS.MIN_PCT) { pcts[this.dragIdx+1] += pcts[this.dragIdx]-this.SETTINGS.MIN_PCT;     pcts[this.dragIdx]     = this.SETTINGS.MIN_PCT; }
    if (pcts[this.dragIdx + 1] < this.SETTINGS.MIN_PCT) { pcts[this.dragIdx]   += pcts[this.dragIdx+1]-this.SETTINGS.MIN_PCT;   pcts[this.dragIdx + 1] = this.SETTINGS.MIN_PCT; }
    this.slots[this.current].pcts = pcts;
    this.renderBar();
  }

  switchSlot(idx) {
    this.current = idx;
    this.loadSlot(idx);
  }

  loadSlot(idx) {
    const s = this.slots[idx];
    if (!s) return;
    this.N = s.N;
    this.buildUI();
    this.updateModeButtons();
    document.getElementById('title-input').value = s.title;
    for (let i = 0; i < this.N; i++) {
      const inp = document.getElementById('op-inp-' + i);
      if (inp) inp.value = s.labels[i] === this.SETTINGS.LABELS[i] ? '' : s.labels[i];
      this.updateLegendText(i);
    }
    this.renderBar();
    this.updateSlotBar();
  }

  markUsed() {
    this.saveSlots();
    this.updateSlotBar();
  }

  updateSlotBar() {
    document.querySelectorAll('.slot-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === this.current);
      btn.classList.toggle('used',   i !== this.current && !!this.slots[i] && this.slotHasData(i));
    });
  }

  resetSlot() {
    this.slots[this.current] = this.makeSlot(2);
    this.loadSlot(this.current);
    this.saveSlots();
  }

  slotHasData(i) {
    const s = this.slots[i]; if (!s) return false;
    const defaultSlot = this.makeSlot(s.N);
    return s.title !== '' || s.labels.some((l,j) => l !== this.SETTINGS.LABELS[j]) ||
      s.pcts.some((p,j) => p !== defaultSlot.pcts[j]);
  }

  handleResize() {
    if (this.slots[this.current]) this.renderBar();
  }
}

let app;
document.addEventListener('DOMContentLoaded', () => {
  app = new ThinkCompareApp();
  app.init();
});
</script>
</body>
</html>
